# electron-builder: produce the installers published to GitHub Releases.
#
#   Windows  InferML-Setup-<v>.exe          (NSIS, x64)
#   macOS    InferML-<v>-{arm64,x64}.dmg    (+ .zip, required by electron-updater)
#   Linux    InferML-<v>.AppImage, .deb     (x64)
#
# What ships inside: the Electron shell, the compiled renderer, and the `python/`
# source tree (the engine + runner.py, which Electron drives over stdio). What
# does NOT ship: a Python interpreter, torch, or any model weights. The app finds
# the user's Python, builds a venv under userData, and the onboarding screen
# installs the inference stack into it on first run.

appId: app.inferml
productName: InferML
copyright: Copyright © 2026 Gitesh Chawda

directories:
  output: dist-app
  # The repo's `build/` already holds Python packaging leftovers, which is also
  # electron-builder's default buildResources location. Point somewhere else so
  # the two never fight.
  buildResources: assets

# The renderer has to be in here now. It used to be served to the window over
# HTTP out of python/server/webui, so it rode along in extraResources; there is
# no server any more and main.js loads it straight off disk with loadFile(), so
# it ships inside the asar like any other app code.
#
# Only `dist/` - the pre-compiled output. The sources (.jsx, and the dev
# index.html that pulls Babel out of node_modules) are useless in a packaged app.
files:
  - src/main/**/*
  - src/renderer/dist/**/*
  - package.json
  - "!**/node_modules/*/{test,__tests__,tests,example,examples,doc,docs}/**"

extraResources:
  - from: python
    to: python
    filter:
      - "**/*"
      # Generated/local junk that must never reach a user's machine.
      - "!**/__pycache__/**"
      - "!**/*.py[cod]"
      - "!**/*.egg-info/**"
      - "!test_outputs/**"
      - "!_test_results.jsonl"
  # The tray icon is loaded at runtime (src/main/tray.js), not just baked into
  # the executable by the `icon` fields below - so the file itself has to ship.
  - from: assets/logo.png
    to: logo.png

# Unsigned builds. Users will see SmartScreen (Windows) and Gatekeeper (macOS)
# warnings on first launch until real certificates are configured; see README.
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/logo.png

  publisherName: Gitesh Chawda

# Artifact names deliberately carry NO version.
#
# GitHub exposes every release asset at a stable, guessable URL:
#
#   https://github.com/IMvision12/InferML/releases/latest/download/<filename>
#
# ...which 302s straight to the newest build. That only works if the filename is
# predictable, so the version is dropped from it. The pay-off is that the website
# can link directly at the installer with no GitHub API call - no rate limit, no
# network round-trip, and the download still works with JavaScript disabled.
# The version still lives in the release tag, title, and latest*.yml.

nsis:
  oneClick: false                     # let the user choose the install dir
  allowToChangeInstallationDirectory: true
  perMachine: false                   # per-user install needs no admin rights
  artifactName: ${productName}-Setup.${ext}          # InferML-Setup.exe
  shortcutName: InferML
  createDesktopShortcut: true

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip           # electron-updater cannot update from a .dmg alone
      arch: [arm64, x64]
  icon: assets/logo.png
  category: public.app-category.developer-tools
  identity: null            # ad-hoc / unsigned until certs exist
  artifactName: ${productName}-${arch}.${ext}        # InferML-arm64.zip

dmg:
  artifactName: ${productName}-${arch}.${ext}        # InferML-arm64.dmg

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/logo.png
  category: Development
  synopsis: Run any Hugging Face model locally
  artifactName: ${productName}.${ext}                # InferML.AppImage

publish:
  provider: github
  owner: IMvision12
  repo: InferML
